apiVersion: v1
kind: Secret
metadata:
  name: new-api-secret
  namespace: new-api
type: Opaque
stringData:
  SESSION_SECRET: replace-with-a-long-random-session-secret
  CRYPTO_SECRET: replace-with-a-long-random-crypto-secret
  # PostgreSQL example:
  SQL_DSN: postgresql://new_api:password@postgres.example.internal:5432/new_api
  # MySQL example:
  # SQL_DSN: new_api:password@tcp(mysql.example.internal:3306)/new_api?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai
  # External Redis is recommended for cache, rate limiting, and multi-replica deployments.
  REDIS_CONN_STRING: redis://:password@redis.example.internal:6379/0
