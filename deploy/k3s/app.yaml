apiVersion: v1
kind: Namespace
metadata:
  name: new-api
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: new-api-backend-config
data:
  PORT: "3000"
  GIN_MODE: release
  TZ: Asia/Shanghai
  FRONTEND_BASE_URL: https://new-api.example.com
  MEMORY_CACHE_ENABLED: "true"
  SQL_MAX_OPEN_CONNS: "200"
  SQL_MAX_IDLE_CONNS: "50"
  SQL_MAX_LIFETIME: "60"
  REDIS_POOL_SIZE: "50"
  RELAY_MAX_IDLE_CONNS: "1000"
  RELAY_MAX_IDLE_CONNS_PER_HOST: "200"
  STREAMING_TIMEOUT: "600"
  MAX_REQUEST_BODY_MB: "32"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-api-backend
  labels:
    app.kubernetes.io/name: new-api-backend
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: new-api-backend
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: new-api-backend
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: backend
          image: ghcr.io/example/new-api/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: new-api-backend-config
          env:
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: new-api-secret
                  key: SESSION_SECRET
            - name: CRYPTO_SECRET
              valueFrom:
                secretKeyRef:
                  name: new-api-secret
                  key: CRYPTO_SECRET
            - name: SQL_DSN
              valueFrom:
                secretKeyRef:
                  name: new-api-secret
                  key: SQL_DSN
            - name: REDIS_CONN_STRING
              valueFrom:
                secretKeyRef:
                  name: new-api-secret
                  key: REDIS_CONN_STRING
                  optional: true
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 8
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: new-api-backend
  labels:
    app.kubernetes.io/name: new-api-backend
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: new-api-backend
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-api-frontend
  labels:
    app.kubernetes.io/name: new-api-frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: new-api-frontend
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: new-api-frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/example/new-api/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: new-api-frontend
  labels:
    app.kubernetes.io/name: new-api-frontend
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: new-api-frontend
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 8080
      targetPort: http
